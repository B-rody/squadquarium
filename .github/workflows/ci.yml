name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: lint · build · unit/integration tests · Playwright (win + linux only)
  # ─────────────────────────────────────────────────────────────────────────────
  lint-build-test:
    name: lint-build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["22.5.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Reads the "packageManager" field from package.json to determine pnpm
          # version. Parker wires that field during monorepo scaffold.
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (all packages)
        run: pnpm -r build

      - name: Unit + integration tests (Vitest)
        run: pnpm -r test

      # Playwright is skipped on macOS for the first pass — it is the slowest
      # runner and rarely the OS that breaks first. macOS coverage is added once
      # the matrix is green on win + linux.
      - name: Install Playwright browsers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @squadquarium/web exec playwright install --with-deps chromium

      - name: Install Playwright browsers (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm --filter @squadquarium/web exec playwright install chromium

      - name: Playwright e2e tests (skip macOS v0)
        if: matrix.os != 'macos-latest'
        run: pnpm test:web

      - name: Upload Playwright report + screenshot diffs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            packages/web/playwright-report/
            packages/web/test/e2e/__screenshots__/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: pack → install from tarball → headless smoke (PTY cross-platform gate)
  # v0 published artifact: `squadquarium` from packages/cli.
  # packages/cli uses esbuild to bundle @squadquarium/core inline; web assets are
  # copied by the prepack script; only runtime deps (node-pty, ws, etc.) install.
  # ─────────────────────────────────────────────────────────────────────────────
  pack-install-smoke:
    name: pack-install-smoke (${{ matrix.os }})
    needs: lint-build-test
    runs-on: ${{ matrix.os }}
    # TEMP: continue-on-error until cli is wired up; Ripley flips this off in
    # the v0 milestone "publish dry run" task.
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["22.5.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all packages)
        run: pnpm -r build

      # pnpm pack-all packs each publishable package.
      # In v0, the only published artifact is packages/cli (the `squadquarium`
      # npm package). It bundles core + web via bundleDependencies — see above.
      - name: Pack all publishable packages
        run: pnpm pack-all

      # Windows needs pwsh for glob expansion; bash elsewhere handles it natively.
      - name: Install CLI from tarball (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tarball = Get-ChildItem -Path packages/cli -Filter "squadquarium-*.tgz" | Select-Object -First 1 -ExpandProperty FullName
          npm install -g $tarball

      - name: Install CLI from tarball (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: npm install -g packages/cli/squadquarium-*.tgz

      - name: Headless smoke test
        timeout-minutes: 2
        run: squadquarium --headless-smoke
