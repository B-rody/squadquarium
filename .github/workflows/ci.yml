name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: lint · build · unit/integration tests
  # ─────────────────────────────────────────────────────────────────────────────
  lint-build-test:
    name: lint-build-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["22.5.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build (all packages)
        run: pnpm -r build

      - name: Unit tests (Vitest)
        run: pnpm -r test

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: pack → install from tarball → headless smoke (PTY cross-platform gate)
  # ─────────────────────────────────────────────────────────────────────────────
  pack-install-smoke:
    name: pack-install-smoke (${{ matrix.os }})
    needs: lint-build-test
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ["22.5.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all packages)
        run: pnpm -r build

      - name: Pack all publishable packages
        run: pnpm pack-all

      - name: Install CLI from tarball (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tarball = Get-ChildItem -Path packages/cli -Filter "squadquarium-*.tgz" | Select-Object -First 1 -ExpandProperty FullName
          npm install -g $tarball

      - name: Install CLI from tarball (Linux / macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: npm install -g packages/cli/squadquarium-*.tgz

      - name: Headless smoke test
        timeout-minutes: 2
        run: squadquarium --headless-smoke
